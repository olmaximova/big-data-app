<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big-Data-App</title>
    <link rel="stylesheet" href='style.css'>
</head>
<body>
    <header>
        <h1>Приложение для работы с большими данными</h1>
    </header>
    <main>
        <section id="upload-file">
            <form action="/upload" method="post" enctype="multipart/form-data">
                <label for="file-upload" class="block">Загрузите свои данные:</label>
                <input type="file" id="file-upload" name="file" />
                <input type="submit" value="Upload"/>
            </form>
        </section>
        <section id="preview-section" style="display: none;">
            <h2>Пример данных (первые 5 строк)</h2>
            <div class="table-wrapper">
                <table id="preview-table">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
            <p id="dataset-id-display"></p>
        </section>
        <section id="analyze" style="display: none;">
            <h2>Анализ данных</h2>
            <div id="column-list"></div>
            <label for="target-select">Выберите целевую переменную:</label>
            <select id="target-select"></select>
            <button id="analyze-btn">Показать статистику</button>
            <div id="stats-output"></div>
        </section>

        <section id="train" style="display: none;">
            <button id="train-btn">Обучить модель</button>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
